<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AR Mirror — Virtual Try-On</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0a0a;
      --surface:  #141414;
      --border:   #2a2a2a;
      --accent:   #e8e8e8;
      --muted:    #666;
      --green:    #4ade80;
      --radius:   12px;
      --mirror-w: 640px;
      --mirror-h: 480px;
    }

    body {
      background: var(--bg);
      color: var(--accent);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
      gap: 20px;
    }

    header {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      max-width: 900px;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.03em;
    }

    header .brand {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    #fps-display {
      margin-left: auto;
      font-size: 11px;
      font-family: monospace;
      color: var(--green);
      background: rgba(74,222,128,0.08);
      padding: 4px 10px;
      border-radius: 20px;
      min-width: 80px;
      text-align: center;
    }

    /* Main layout */
    .main-layout {
      display: flex;
      gap: 20px;
      width: 100%;
      max-width: 900px;
      align-items: flex-start;
    }

    /* AR Mirror canvas area */
    .mirror-wrap {
      position: relative;
      width: var(--mirror-w);
      height: var(--mirror-h);
      border-radius: var(--radius);
      overflow: hidden;
      background: #111;
      flex-shrink: 0;
      border: 1px solid var(--border);
    }

    #output-canvas {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Hidden canvases / video */
    #cloth-canvas,
    #video-el {
      display: none;
      position: absolute;
      pointer-events: none;
    }

    /* Status overlay */
    #status-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(4px);
      transition: opacity 0.4s;
    }

    #status-overlay.hidden { opacity: 0; pointer-events: none; }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #status-text {
      font-size: 13px;
      color: var(--muted);
      text-align: center;
      max-width: 220px;
    }

    /* Pose guide overlay */
    #pose-guide {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      background: rgba(0,0,0,0.4);
      padding: 4px 12px;
      border-radius: 20px;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    #pose-guide.hidden { opacity: 0; }

    /* Tracking indicator */
    #tracking-dot {
      position: absolute;
      top: 12px;
      left: 12px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }
    #tracking-dot.active { background: var(--green); box-shadow: 0 0 6px var(--green); }

    /* ── Right panel ── */
    .side-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-width: 0;
    }

    .panel-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
    }

    .section-label {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }

    /* Garment grid */
    .garment-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    /* ── Skeleton shimmer ── */
    @keyframes shimmer {
      0%   { background-position: -400px 0; }
      100% { background-position:  400px 0; }
    }
    .skeleton-card {
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      background: #1a1a1a;
      pointer-events: none;
    }
    .skeleton-img {
      width: 100%;
      aspect-ratio: 3/4;
      background: linear-gradient(90deg,
        #222 25%, #2e2e2e 50%, #222 75%);
      background-size: 800px 100%;
      animation: shimmer 1.4s infinite linear;
    }
    .skeleton-info {
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .skeleton-line {
      height: 10px;
      border-radius: 4px;
      background: linear-gradient(90deg,
        #222 25%, #2e2e2e 50%, #222 75%);
      background-size: 800px 100%;
      animation: shimmer 1.4s infinite linear;
    }
    .skeleton-line.short { width: 50%; }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .garment-card {
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.15s;
      background: #1a1a1a;
      touch-action: manipulation;          /* no 300ms tap delay */
      -webkit-tap-highlight-color: transparent;
    }
    .garment-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .garment-card.selected { border-color: var(--accent); border-width: 2px; }

    .garment-card img {
      width: 100%;
      aspect-ratio: 3/4;
      object-fit: cover;
      display: block;
      background: #222;
    }

    .garment-info {
      padding: 8px;
    }
    .garment-name {
      font-size: 12px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .garment-price {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    /* Size chips */
    .size-chips {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .size-chip {
      flex: 1;
      min-width: 36px;
      padding: 6px 4px;
      background: transparent;
      color: var(--fg);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: border-color 0.18s, background 0.18s, color 0.18s;
      text-align: center;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .size-chip:hover   { border-color: var(--accent); }
    .size-chip.active  { background: var(--accent); color: var(--bg); border-color: var(--accent); }
    .size-note {
      font-size: 10px;
      color: var(--muted);
      margin-top: 8px;
    }

    /* Height calibration */
    .height-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .height-row input[type=number] {
      flex: 1;
      background: #111;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--fg);
      padding: 6px 10px;
      font-size: 13px;
      outline: none;
      -moz-appearance: textfield;
    }
    .height-row input[type=number]:focus { border-color: var(--accent); }
    .height-row input::-webkit-outer-spin-button,
    .height-row input::-webkit-inner-spin-button { -webkit-appearance: none; }
    .height-set-btn {
      padding: 6px 14px;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.2s;
    }
    .height-set-btn:hover { opacity: 0.85; }

    /* Debug badge */
    #debug-badge {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(74,222,128,0.20);
      border: 1px solid #4ade80;
      color: #4ade80;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 3px 8px;
      border-radius: 4px;
      pointer-events: none;
      display: none;
      z-index: 10;
    }
    #debug-badge.visible { display: block; }

    /* CTA button */
    #add-to-cart {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      letter-spacing: 0.02em;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    #add-to-cart:hover { opacity: 0.9; transform: translateY(-1px); }
    #add-to-cart:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
    #add-to-cart.added {
      background: var(--green);
      color: #000;
    }

    /* Share / snapshot button */
    #share-btn {
      width: 100%;
      padding: 10px;
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      letter-spacing: 0.02em;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    #share-btn:hover { border-color: var(--accent); background: rgba(255,255,255,0.05); }
    #share-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    #share-btn.flash { background: var(--accent); color: var(--bg); }

    /* Analytics mini-panel */
    #analytics-panel {
      font-size: 11px;
      color: var(--muted);
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .kv { display: flex; justify-content: space-between; }
    .kv span:last-child { color: var(--accent); font-family: monospace; }

    /* Responsive */
    @media (max-width: 720px) {
      :root { --mirror-w: 100vw; --mirror-h: calc(100vw * 0.75); }
      .main-layout { flex-direction: column; }
      .mirror-wrap { width: 100%; height: calc(100vw * 0.75); }
      .garment-grid { grid-template-columns: repeat(3, 1fr); }
      body { padding: 12px 10px; gap: 14px; }
    }

    /* Small phones (portrait) */
    @media (max-width: 400px) {
      :root { --mirror-h: calc(100vw * 0.85); }
      .garment-grid {
        /* Horizontal scroll strip on very small screens */
        display: flex;
        overflow-x: auto;
        gap: 10px;
        padding-bottom: 4px;
        scroll-snap-type: x mandatory;
        -webkit-overflow-scrolling: touch;
      }
      .garment-card {
        flex-shrink: 0;
        width: 100px;
        scroll-snap-align: start;
      }
      header h1 { font-size: 15px; }
      #add-to-cart { font-size: 13px; padding: 10px; }
    }

    /* Landscape phone */
    @media (max-height: 500px) and (orientation: landscape) {
      .main-layout { flex-direction: row; align-items: flex-start; }
      :root { --mirror-w: 60vw; --mirror-h: 80vh; }
      .mirror-wrap { width: var(--mirror-w); height: var(--mirror-h); }
      body { padding: 8px; gap: 8px; }
    }
  </style>
</head>
<body>

  <header>
    <div>
      <div class="brand">AR Mirror</div>
      <h1>Virtual Try-On</h1>
    </div>
    <div id="fps-display">— FPS</div>
  </header>

  <div class="main-layout">

    <!-- AR Mirror viewport -->
    <div class="mirror-wrap">
      <canvas id="output-canvas" width="640" height="480"></canvas>
      <canvas id="cloth-canvas" width="640" height="480"></canvas>
      <video  id="video-el" playsinline muted></video>

      <!-- Loading overlay -->
      <div id="status-overlay">
        <div class="spinner"></div>
        <div id="status-text">Loading AI models…<br>First load ~10 seconds</div>
      </div>

      <!-- Pose guide hint -->
      <div id="pose-guide">Stand back so your full torso is visible</div>

      <!-- Tracking LED -->
      <div id="tracking-dot" title="Pose tracking status"></div>
      <!-- Debug badge (shown when D key is active) -->
      <div id="debug-badge">DEBUG</div>
    </div>

    <!-- Side panel -->
    <div class="side-panel">

      <div class="panel-section">
        <div class="section-label">Select Garment</div>
        <div class="garment-grid" id="garment-grid">
          <!-- Skeleton cards shown until API responds -->
          <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-info"><div class="skeleton-line"></div><div class="skeleton-line short"></div></div></div>
          <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-info"><div class="skeleton-line"></div><div class="skeleton-line short"></div></div></div>
          <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-info"><div class="skeleton-line"></div><div class="skeleton-line short"></div></div></div>
          <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-info"><div class="skeleton-line"></div><div class="skeleton-line short"></div></div></div>
        </div>
      </div>

      <div class="panel-section">
        <div class="section-label">Size</div>
        <div class="size-chips" id="size-chips">
          <button class="size-chip" data-size="XS" data-mult="0.82">XS</button>
          <button class="size-chip" data-size="S"  data-mult="0.91">S</button>
          <button class="size-chip active" data-size="M" data-mult="1.0">M</button>
          <button class="size-chip" data-size="L"  data-mult="1.10">L</button>
          <button class="size-chip" data-size="XL" data-mult="1.22">XL</button>
        </div>
        <div class="size-note" id="size-note">M selected — garment scales with your body</div>
      </div>

      <div class="panel-section">
        <div class="section-label">Your Height</div>
        <div class="height-row">
          <input type="number" id="height-input" min="140" max="220" value="170" placeholder="cm">
          <button class="height-set-btn" id="height-set-btn">Set</button>
        </div>
        <div class="size-note" id="height-note">170 cm — garment fit calibrated</div>
      </div>

      <div class="panel-section">
        <button id="add-to-cart" disabled>Select a garment to try on</button>
        <div style="height:8px"></div>
        <button id="share-btn" disabled>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
          Share Try-On Photo
        </button>
      </div>

      <div class="panel-section" id="analytics-panel">
        <div class="section-label">Session</div>
        <div class="kv"><span>Try-on engagement</span><span id="stat-engagement">—</span></div>
        <div class="kv"><span>Active garment</span><span id="stat-garment">—</span></div>
        <div class="kv"><span>Duration</span><span id="stat-duration">0s</span></div>
      </div>

    </div>
  </div>

  <!-- MediaPipe: try primary CDN, fall back to secondary if it fails -->
  <script>
    (function() {
      const PRIMARY  = 'https://cdn.jsdelivr.net/npm';
      const FALLBACK = 'https://unpkg.com';
      const PKGS = [
        '@mediapipe/pose@0.5.1675469404/pose.js',
        '@mediapipe/selfie_segmentation@0.1.1675465747/selfie_segmentation.js',
      ];
      let loaded = 0;
      function loadScript(src, fallbackSrc) {
        const s = document.createElement('script');
        s.src = src;
        s.crossOrigin = 'anonymous';
        s.onload  = () => { loaded++; };
        s.onerror = () => {
          console.warn('[CDN] Primary failed, trying fallback:', src);
          const f   = document.createElement('script');
          f.src     = fallbackSrc;
          f.crossOrigin = 'anonymous';
          f.onerror = () => console.error('[CDN] Both CDNs failed for:', src);
          document.head.appendChild(f);
        };
        document.head.appendChild(s);
      }
      PKGS.forEach(pkg => loadScript(PRIMARY + '/' + pkg, FALLBACK + '/' + pkg));
    })();
  </script>

  <script type="module">
    import { App }                from './src/app.js';
    import { PoseTracker }        from './src/pose_tracker.js';
    import { initErrorTelemetry } from './src/analytics.js';

    // ── Service Worker registration (model caching) ────────────────────────
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').then(reg => {
        console.log('[SW] Registered, scope:', reg.scope);
      }).catch(err => console.warn('[SW] Registration failed:', err));
    }

    // ── Garment catalog — loaded from API (edit garments.json to change) ────
    let GARMENTS = [];
    try {
      const res = await fetch('/api/garments');
      GARMENTS  = await res.json();
    } catch (e) {
      console.warn('[Catalog] API unavailable:', e);
    }

    // ── DOM refs ──────────────────────────────────────────────────────────────
    const outputCanvas   = document.getElementById('output-canvas');
    const clothCanvas    = document.getElementById('cloth-canvas');
    const videoEl        = document.getElementById('video-el');
    const fpsDisplay     = document.getElementById('fps-display');
    const statusOverlay  = document.getElementById('status-overlay');
    const statusText     = document.getElementById('status-text');
    const poseGuide      = document.getElementById('pose-guide');
    const trackingDot    = document.getElementById('tracking-dot');
    const garmentGrid    = document.getElementById('garment-grid');
    const addToCartBtn   = document.getElementById('add-to-cart');
    const shareBtnEl     = document.getElementById('share-btn');
    const statEngagement = document.getElementById('stat-engagement');
    const statGarment    = document.getElementById('stat-garment');
    const statDuration   = document.getElementById('stat-duration');
    const sizeChipsEl    = document.getElementById('size-chips');
    const sizeNoteEl     = document.getElementById('size-note');
    const heightInputEl  = document.getElementById('height-input');
    const heightSetBtn   = document.getElementById('height-set-btn');
    const heightNoteEl   = document.getElementById('height-note');
    const debugBadgeEl   = document.getElementById('debug-badge');

    // ── Build garment cards ───────────────────────────────────────────────────
    let selectedGarment = null;

    // Replace skeleton placeholders with real cards
    garmentGrid.innerHTML = '';

    GARMENTS.forEach((g, i) => {
      const card = document.createElement('div');
      card.className = 'garment-card';
      card.style.animationDelay = `${i * 60}ms`;
      card.style.animation = `cardIn 0.25s ease ${i * 60}ms both`;
      card.innerHTML = `
        <img src="${g.imageUrl}" alt="${g.name}"
          onerror="this.style.background='#2a2a2a';this.style.height='120px'">
        <div class="garment-info">
          <div class="garment-name">${g.name}</div>
          <div class="garment-price">$${g.price}</div>
        </div>`;
      card.addEventListener('click', () => selectGarment(g, card));
      garmentGrid.appendChild(card);
    });

    async function selectGarment(garment, card) {
      // Update UI
      document.querySelectorAll('.garment-card').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
      selectedGarment = garment;

      addToCartBtn.disabled = false;
      addToCartBtn.classList.remove('added');
      addToCartBtn.textContent = `Add "${garment.name}" to Cart — $${garment.price}`;

      statGarment.textContent = garment.name;

      await app.selectGarment(garment);
    }

    // ── Size chips ──────────────────────────────────────────────────────
    sizeChipsEl.addEventListener('click', (e) => {
      const chip = e.target.closest('.size-chip');
      if (!chip) return;
      // Toggle active
      sizeChipsEl.querySelectorAll('.size-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      const mult = parseFloat(chip.dataset.mult);
      const size = chip.dataset.size;
      app.setSize(mult);
      sizeNoteEl.textContent = `${size} selected — garment scales with your body`;
    });

    // ── Height calibration ──────────────────────────────────────────────
    function applyHeight() {
      const cm = parseInt(heightInputEl.value, 10);
      if (!cm || cm < 140 || cm > 220) return;
      app.setHeight(cm);
      heightNoteEl.textContent = `${cm} cm — garment fit calibrated`;
    }
    heightSetBtn.addEventListener('click', applyHeight);
    heightInputEl.addEventListener('keydown', e => { if (e.key === 'Enter') applyHeight(); });

    // ── D key — debug skeleton overlay ─────────────────────────────────
    document.addEventListener('keydown', e => {
      if ((e.key === 'd' || e.key === 'D') && !e.target.matches('input,textarea')) {
        const on = app.toggleDebug();
        debugBadgeEl.classList.toggle('visible', on);
      }
    });

    // ── Add to cart ─────────────────────────────────────────────────────
    addToCartBtn.addEventListener('click', () => {
      if (!selectedGarment) return;
      app.trackAddToCart(selectedGarment);
      addToCartBtn.textContent = '✓ Added to Cart';
      addToCartBtn.classList.add('added');
      setTimeout(() => {
        addToCartBtn.textContent = `Add "${selectedGarment.name}" to Cart — $${selectedGarment.price}`;
        addToCartBtn.classList.remove('added');
      }, 2000);
    });
    // ── Share / snapshot ────────────────────────────────────────────────
    shareBtnEl.addEventListener('click', async () => {
      const canvas = outputCanvas;

      // Try Web Share API first (mobile — shows native share sheet)
      if (navigator.share && navigator.canShare) {
        try {
          canvas.toBlob(async (blob) => {
            const file = new File([blob], 'my-tryon.png', { type: 'image/png' });
            if (navigator.canShare({ files: [file] })) {
              await navigator.share({
                title: 'Check out how I look in this!',
                text:  `I tried on ${selectedGarment?.name} with AR Mirror`,
                files: [file],
              });
              return;
            }
            // Fall through to download
            downloadCanvas(canvas);
          }, 'image/png');
          return;
        } catch (e) {
          if (e.name !== 'AbortError') downloadCanvas(canvas);
        }
      } else {
        downloadCanvas(canvas);
      }
    });

    function downloadCanvas(canvas) {
      canvas.toBlob((blob) => {
        const url = URL.createObjectURL(blob);
        const a   = document.createElement('a');
        a.href     = url;
        a.download = `ar-mirror-${selectedGarment?.id || 'tryon'}-${Date.now()}.png`;
        a.click();
        URL.revokeObjectURL(url);
        shareBtnEl.classList.add('flash');
        setTimeout(() => shareBtnEl.classList.remove('flash'), 600);
      }, 'image/png');
    }
    // ── Init & start ──────────────────────────────────────────────────────────
    const app = new App({ brandId: 'demo', garments: GARMENTS });

    // Start error telemetry ASAP (captures any init failures)
    initErrorTelemetry(app._analytics._sessionId);

    // Tracking dot state
    let _trackingActive = false;

    try {
      statusText.textContent = 'Starting camera…';
      await app.startCamera(videoEl, outputCanvas, clothCanvas);

      statusText.textContent = 'Loading AI models… (~10s first load)';
      await app.init(videoEl, outputCanvas, clothCanvas, fpsDisplay);
    } catch (err) {
      console.error('[AR Mirror] Init failed:', err);
      statusText.textContent = '⚠ ' + (err.message || 'Init failed — check console');
      statusText.style.color = '#f87171';
      // Keep overlay visible so user sees the error
      throw err;
    }

    // Hide loading overlay
    statusOverlay.classList.add('hidden');

    // Auto-hide pose guide after 8 seconds
    setTimeout(() => poseGuide.classList.add('hidden'), 8000);

    app.start();

    // Enable share button once app is running
    shareBtnEl.disabled = false;

    // ── Tracking indicator update (every 500ms) ───────────────────────────────
    setInterval(() => {
      const lm = app._latestLandmarks;
      if (lm && PoseTracker.isConfident(lm)) {
        trackingDot.classList.add('active');
        poseGuide.classList.add('hidden');
      } else {
        trackingDot.classList.remove('active');
        if (selectedGarment) poseGuide.classList.remove('hidden');
      }
    }, 500);

    // ── Stats panel update ────────────────────────────────────────────────────
    setInterval(() => {
      const summary = app._analytics.getSummary();
      statEngagement.textContent = summary.tryonEngagement;
      statDuration.textContent   = summary.durationSec + 's';
    }, 1000);
  </script>
</body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="300" height="400">
  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#e8e8e8"/>
      <stop offset="45%"  stop-color="#fafafa"/>
      <stop offset="100%" stop-color="#e0e0e0"/>
    </linearGradient>
    <linearGradient id="sleeveL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#d8d8d8"/>
      <stop offset="100%" stop-color="#eeeeee"/>
    </linearGradient>
    <linearGradient id="sleeveR" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#eeeeee"/>
      <stop offset="100%" stop-color="#d8d8d8"/>
    </linearGradient>
  </defs>
  <!-- Left sleeve -->
  <path d="M80,82 L52,130 L58,134 L86,130 L90,95 Z" fill="url(#sleeveL)" stroke="#ccc" stroke-width="1.5"/>
  <!-- Right sleeve -->
  <path d="M220,82 L248,130 L242,134 L214,130 L210,95 Z" fill="url(#sleeveR)" stroke="#ccc" stroke-width="1.5"/>
  <!-- Main body -->
  <path d="M86,78 L90,95 L90,350 L210,350 L210,95 L214,78 L180,62 C172,50 128,50 120,62 Z"
    fill="url(#bodyGrad)" stroke="#c8c8c8" stroke-width="1.5"/>
  <!-- Collar left side -->
  <path d="M120,62 C128,50 148,58 150,72 L140,100 L110,86 Z"
    fill="#f0f0f0" stroke="#bbb" stroke-width="1"/>
  <!-- Collar right side -->
  <path d="M180,62 C172,50 152,58 150,72 L160,100 L190,86 Z"
    fill="#f0f0f0" stroke="#bbb" stroke-width="1"/>
  <!-- Placket (button strip) -->
  <rect x="146" y="100" width="8" height="250" fill="#eeeeee" stroke="#ccc" stroke-width="0.5" rx="1"/>
  <!-- Buttons -->
  <circle cx="150" cy="128" r="3.5" fill="#ddd" stroke="#bbb" stroke-width="1"/>
  <circle cx="150" cy="155" r="3.5" fill="#ddd" stroke="#bbb" stroke-width="1"/>
  <circle cx="150" cy="182" r="3.5" fill="#ddd" stroke="#bbb" stroke-width="1"/>
  <circle cx="150" cy="209" r="3.5" fill="#ddd" stroke="#bbb" stroke-width="1"/>
  <circle cx="150" cy="236" r="3.5" fill="#ddd" stroke="#bbb" stroke-width="1"/>
  <!-- Side seams -->
  <line x1="90" y1="130" x2="90" y2="350" stroke="#c5c5c5" stroke-width="0.8"/>
  <line x1="210" y1="130" x2="210" y2="350" stroke="#c5c5c5" stroke-width="0.8"/>
  <!-- Sleeve cuffs -->
  <path d="M52,130 L58,134 L58,148 L50,144 Z" fill="#e0e0e0" stroke="#ccc" stroke-width="1"/>
  <path d="M248,130 L242,134 L242,148 L250,144 Z" fill="#e0e0e0" stroke="#ccc" stroke-width="1"/>
  <!-- Hem -->
  <line x1="90" y1="345" x2="210" y2="345" stroke="#c5c5c5" stroke-width="1"/>
</svg>

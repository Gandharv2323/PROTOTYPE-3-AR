<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="300" height="400">
  <defs>
    <pattern id="stripes" x="0" y="0" width="16" height="1" patternUnits="userSpaceOnUse">
      <rect width="8" height="400" fill="#f8f8ff"/>
      <rect x="8" width="8" height="400" fill="#4a7cc7"/>
    </pattern>
    <linearGradient id="stripeShadeL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="rgba(0,0,60,0.18)"/>
      <stop offset="100%" stop-color="rgba(0,0,60,0)"/>
    </linearGradient>
    <linearGradient id="stripeShadeR" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="rgba(0,0,60,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,60,0.18)"/>
    </linearGradient>
  </defs>
  <!-- Left sleeve base -->
  <path d="M80,82 L52,130 L58,134 L86,130 L90,95 Z" fill="url(#stripes)" stroke="#9ab4d8" stroke-width="1.5"/>
  <path d="M80,82 L52,130 L58,134 L86,130 L90,95 Z" fill="url(#stripeShadeL)"/>
  <!-- Right sleeve base -->
  <path d="M220,82 L248,130 L242,134 L214,130 L210,95 Z" fill="url(#stripes)" stroke="#9ab4d8" stroke-width="1.5"/>
  <path d="M220,82 L248,130 L242,134 L214,130 L210,95 Z" fill="url(#stripeShadeR)"/>
  <!-- Main body -->
  <path d="M86,78 L90,95 L90,350 L210,350 L210,95 L214,78 L180,62 C172,50 128,50 120,62 Z"
    fill="url(#stripes)" stroke="#9ab4d8" stroke-width="1.5"/>
  <!-- Edge shading -->
  <path d="M86,78 L90,95 L90,350 L100,350 L100,95 L104,78 Z" fill="url(#stripeShadeL)"/>
  <path d="M196,78 L200,95 L200,350 L210,350 L210,95 L214,78 Z" fill="url(#stripeShadeR)"/>
  <!-- Collar left -->
  <path d="M120,62 C128,50 148,58 150,72 L140,100 L110,86 Z"
    fill="#f0f6ff" stroke="#9ab4d8" stroke-width="1"/>
  <!-- Collar right -->
  <path d="M180,62 C172,50 152,58 150,72 L160,100 L190,86 Z"
    fill="#f0f6ff" stroke="#9ab4d8" stroke-width="1"/>
  <!-- Placket -->
  <rect x="146" y="100" width="8" height="250" fill="rgba(255,255,255,0.5)" stroke="#9ab4d8" stroke-width="0.5" rx="1"/>
  <!-- Buttons -->
  <circle cx="150" cy="128" r="3.5" fill="#ddeeff" stroke="#9ab4d8" stroke-width="1"/>
  <circle cx="150" cy="155" r="3.5" fill="#ddeeff" stroke="#9ab4d8" stroke-width="1"/>
  <circle cx="150" cy="182" r="3.5" fill="#ddeeff" stroke="#9ab4d8" stroke-width="1"/>
  <circle cx="150" cy="209" r="3.5" fill="#ddeeff" stroke="#9ab4d8" stroke-width="1"/>
  <circle cx="150" cy="236" r="3.5" fill="#ddeeff" stroke="#9ab4d8" stroke-width="1"/>
  <!-- Cuffs -->
  <path d="M52,130 L58,134 L58,148 L50,144 Z" fill="#f0f6ff" stroke="#9ab4d8" stroke-width="1"/>
  <path d="M248,130 L242,134 L242,148 L250,144 Z" fill="#f0f6ff" stroke="#9ab4d8" stroke-width="1"/>
  <!-- Hem -->
  <line x1="90" y1="345" x2="210" y2="345" stroke="#9ab4d8" stroke-width="1"/>
</svg>
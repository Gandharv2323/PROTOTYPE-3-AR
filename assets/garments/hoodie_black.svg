<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="300" height="400">
  <defs>
    <linearGradient id="hoodieGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#2a2a2a"/>
      <stop offset="50%"  stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <linearGradient id="hoodieSlL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#111"/>
      <stop offset="100%" stop-color="#222"/>
    </linearGradient>
    <linearGradient id="hoodieSlR" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#222"/>
      <stop offset="100%" stop-color="#111"/>
    </linearGradient>
  </defs>
  <!-- Left sleeve -->
  <path d="M76,84 L44,150 L52,155 L86,138 L90,98 Z" fill="url(#hoodieSlL)" stroke="#0a0a0a" stroke-width="1.5"/>
  <!-- Right sleeve -->
  <path d="M224,84 L256,150 L248,155 L214,138 L210,98 Z" fill="url(#hoodieSlR)" stroke="#0a0a0a" stroke-width="1.5"/>
  <!-- Main body -->
  <path d="M86,80 L90,98 L90,355 L210,355 L210,98 L214,80 L182,64 C175,46 125,46 118,64 Z"
    fill="url(#hoodieGrad)" stroke="#0d0d0d" stroke-width="1.5"/>
  <!-- Hood -->
  <path d="M118,64 C114,44 108,38 102,42 L96,80 L118,88 L150,78 L182,88 L204,80 L198,42 C192,38 186,44 182,64 C174,42 128,42 118,64 Z"
    fill="#1e1e1e" stroke="#0a0a0a" stroke-width="1.5"/>
  <!-- Hood opening -->
  <path d="M118,88 C128,104 172,104 182,88 L176,78 L150,84 L124,78 Z"
    fill="#0f0f0f" stroke="#0a0a0a" stroke-width="1"/>
  <!-- Drawstrings -->
  <line x1="138" y1="88" x2="132" y2="150" stroke="#444" stroke-width="1.5"/>
  <line x1="162" y1="88" x2="168" y2="150" stroke="#444" stroke-width="1.5"/>
  <circle cx="132" cy="152" r="3" fill="#555" stroke="#333" stroke-width="1"/>
  <circle cx="168" cy="152" r="3" fill="#555" stroke="#333" stroke-width="1"/>
  <!-- Kangaroo pocket -->
  <rect x="110" y="240" width="80" height="60" rx="4" fill="#161616" stroke="#0a0a0a" stroke-width="1.5"/>
  <line x1="150" y1="240" x2="150" y2="300" stroke="#0a0a0a" stroke-width="1"/>
  <!-- Ribbed hem -->
  <rect x="90" y="345" width="120" height="10" rx="2" fill="#161616" stroke="#0a0a0a" stroke-width="1"/>
  <line x1="90" y1="349" x2="210" y2="349" stroke="#222" stroke-width="0.8"/>
  <line x1="90" y1="352" x2="210" y2="352" stroke="#222" stroke-width="0.8"/>
  <!-- Sleeve cuffs -->
  <path d="M44,150 L52,155 L52,168 L42,163 Z" fill="#161616" stroke="#0a0a0a" stroke-width="1"/>
  <path d="M256,150 L248,155 L248,168 L258,163 Z" fill="#161616" stroke="#0a0a0a" stroke-width="1"/>
</svg>